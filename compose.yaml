# Общая оркестрация локального окружения Vacanza через Docker Compose.
# Порядок запуска: MySQL -> Backend -> Frontend.
services:
  # Секция базы данных. Хранит состояние в volume и инициализируется SQL-скриптами.
  mysql-vacanza-service:

    image: mysql:8

    container_name: mysql-vacanza-container

    environment:
      MYSQL_HOST: localhost
      MYSQL_PORT: 3306
      MYSQL_USER: vacanza_user
      MYSQL_PASSWORD: 123123
      MYSQL_DATABASE: vacanza
      MYSQL_ROOT_PASSWORD: 123123 
    
    volumes:
      - mysql-vacanza-volume:/var/lib/mysql
      - ./database/MySQL:/docker-entrypoint-initdb.d


    restart: unless-stopped


    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
  # ---------------------------------------------------------------------------
  # Секция backend API. Запускается только после готовности базы данных.
  # ---------------------------------------------------------------------------

  backend-vacanza-service:


    depends_on:
      mysql-vacanza-service:
        condition: service_healthy


    build:
      context: .
      dockerfile: ./backend/Dockerfile
    
    image: davids1990/backend-vacanza-image:v1
    container_name: backend-vacanza-container

    environment:
      MYSQL_HOST: mysql-vacanza-service
      MYSQL_PORT: 3306
      MYSQL_USER: vacanza_user
      MYSQL_PASSWORD: 123123
      MYSQL_DATABASE: vacanza
      
    ports:
      - 3000:3000
    

    volumes:
      - backend-vacanza-volume:/app/assets

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:3000/ping', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); });"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s



  # ---------------------------------------------------------------------------
  # Секция frontend SPA. Запускается после готовности backend API.
  # ---------------------------------------------------------------------------


  frontend-vacanza-service:

    depends_on:
      backend-vacanza-service:
        condition: service_healthy

    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    
    image: davids1990/frontend-vacanza-image:v1
    container_name: frontend-vacanza-container
    
    ports:
      - 80:5173
    
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "--eval", "require('http').get('http://localhost:5173/api/ping', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); });"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s


  # ---------------------------------------------------------------------------
  # Именованные volume для сохранения состояния между перезапусками контейнеров.
  # ---------------------------------------------------------------------------
volumes:
  mysql-vacanza-volume:
  backend-vacanza-volume:
